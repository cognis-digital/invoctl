apiVersion: apps/v1
kind: Deployment
metadata: { name: invoctl, labels: { app: invoctl } }
spec:
  replicas: 1
  selector: { matchLabels: { app: invoctl } }
  template:
    metadata: { labels: { app: invoctl } }
    spec:
      containers:
        - name: invoctl
          image: ghcr.io/cognis-digital/invoctl:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: invoctl }
spec:
  selector: { app: invoctl }
  ports: [{ port: 80, targetPort: 8000 }]
